<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo7 Mini App</title>
    <style>
        /* 🎨 የ CSS (ውበት) ክፍል */
        body {
            background-color: #121212;
            color: white;
            padding: 15px;
            font-family: sans-serif;
            text-align: center;
            margin: 0;
        }

        .room-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 400px;
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 20px;
            background: #1e1e1e;
            padding: 10px;
            border-radius: 8px;
            box-sizing: border-box;
        }

        .title-yellow {
            color: #ffcc00;
            font-size: 22px;
            margin: 5px 0;
        }

        .sub-title {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 15px;
        }

        /* 🌟 የ 10 ረድፍ ካርታዎች ማሰለፊያ */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 8px;
            margin-top: 15px;
            width: 100%;
            max-width: 400px;
            max-height: 380px;
            overflow-y: auto;
            padding: 5px;
            background: #1a1a1a;
            border-radius: 8px;
            box-sizing: border-box;
        }

        /* የቀይ ካርታዎች በተን ዲዛይን */
        .card-item {
            background-color: #d32f2f;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 12px 0;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        .card-item:active {
            transform: scale(0.9);
        }

        /* ሲመረጥ አረንጓዴ የሚሆን */
        .card-item.selected {
            background-color: #388e3c;
            box-shadow: 0 0 8px #fff;
        }
    </style>
</head>
<body>

    <div id="card-selection-screen" class="room-screen">
        <div class="top-bar">
            <div>WALLET: <span id="wallet-balance">40 ETB</span></div>
            <div>STAKE: <span id="stake-amount">10 ETB</span></div>
            <div>TIME: <span id="countdown-timer">30</span>s</div>
        </div>

        <h2 class="title-yellow">Choose Your Bingo Card</h2>
        <p class="sub-title">ጨዋታው ሊጀምር ነው — ካርታ ይምረጡ!</p>

        <div id="cards-grid" class="cards-grid"></div>
    </div>

    <script>
        // ⚙️ የ ጃቫስክሪፕት (አእምሮ) ክፍል
        document.addEventListener("DOMContentLoaded", () => {
            generate200SelectionCards();
            startCountdown(30);
        });

        // 200 ቁጥሮችን ፈጥሮ በ 10 ረድፍ መደርደሪያ
        function generate200SelectionCards() {
            const grid = document.getElementById("cards-grid");
            grid.innerHTML = ""; 

            for (let i = 1; i <= 200; i++) {
                const cardBtn = document.createElement("button");
                cardBtn.className = "card-item";
                cardBtn.innerText = i; 

                // ካርታ ሲመረጥ
                cardBtn.addEventListener("click", () => {
                    const previouslySelected = document.querySelector(".card-item.selected");
                    if (previouslySelected) {
                        previouslySelected.classList.remove("selected");
                    }
                    cardBtn.classList.add("selected");
                    console.log("የተመረጠው ካርታ ቁጥር፦ " + i);
                });

                grid.appendChild(cardBtn);
            }
        }

        // ሰዓት መቁጠሪያ

            const timerDisplay = document.getElementById("countdown-timer");

                }

        }
    </script>
</body>
</html>
