<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo 7</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

    <div id="welcome-view" class="view-section">
        <div class="header-logo">
            <span class="logo-badge">7</span>
            <h2>Bingo 7</h2>
            <button class="btn-rules" onclick="showRules()">⚙️ Rules</button>
        </div>
        
        <div class="welcome-box">
            <h1>Welcome to Bingo</h1>
            <h3>Choose Your Stake</h3>
            
            <div class="stake-buttons">
                <button class="btn-stake" onclick="selectStake(10)">▶ Play 10</button>
                <button class="btn-stake" onclick="selectStake(20)">▶ Play 20</button>
            </div>
            
            <div class="stats-box">
                <p>10,000+ Active Players</p>
                <p>50,000+ Games Played</p>
            </div>
        </div>
    </div>

    <div id="card-selection-view" class="view-section style-hidden">
        <div class="top-bar">
            <button class="btn-back" onclick="location.reload()">← Back</button>
            <div class="wallet-badge">Main: <span id="main-wallet-display">500</span> ETB</div>
            <div class="wallet-badge">Play: <span id="play-wallet-display">0</span> ETB</div>
            <div class="wallet-badge">Stake: <span id="stake-counter-display">0</span></div>
            <div class="timer-badge" id="game-timer">15 s</div>
        </div>
        
        <div class="instructions">
            <p>💡 የሚጫወቱበትን ካርቴላ (እስከ 5 ካርቴላ) በፍጥነት ይምረጡ!</p>
        </div>

        <div id="cards-container" class="cards-grid"></div>
    </div>

    <div id="gameplay-view" class="view-section style-hidden">
        <div class="game-header">
            <div class="header-stat">ካርድ: <span id="my-card-number">—</span></div>
            <div class="header-stat">ተጫዋቾች: <span id="live-players-game">0</span></div>
            <div class="header-stat" style="color:#ffcc00;">ደራሽ: <span id="live-derash-game">0</span> ETB</div>
            <div class="header-stat">ጥሪ: <span id="live-calls-count">0</span></div>
        </div>

        <div class="game-body-layout">
            <div id="bingo-numbers-board" class="numbers-board"></div>
            
            <div class="my-cards-sidebar">
                <div class="sidebar-title">የእርስዎ ቁጥሮች</div>
                <div id="my-lucky-numbers"></div>
            </div>
        </div>

        <div id="game-status-message" class="live-status-bar">
            🔄 ጨዋታው ሊጀምር ነው፣ ይዘጋጁ...
        </div>
    </div>

    <div class="bottom-nav">
        <button class="nav-item active"><span class="icon">🎮</span>Game</button>
        <button class="nav-item"><span class="icon">🕒</span>History</button>
        <button class="nav-item"><span class="icon">👛</span>Wallet</button>
        <button class="nav-item"><span class="icon">👤</span>Profile</button>
    </div>

    <script src="mini-app.js"></script>
</body>
</html>
