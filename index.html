<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bingo 7</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="user-profile">
                <div class="avatar" id="user-avatar">B</div>
                <span class="username" id="user-name">Bingo 7</span>
            </div>
            <button class="rules-btn" onclick="showRules()">⚙️ Rules</button>
        </header>

        <main class="main-content" id="app-main">
            <div id="welcome-view" class="view-active">
                <h1 class="welcome-title">Welcome to <span class="highlight">Bingo 7</span></h1>
                
                <div class="stake-card">
                    <h2 class="stake-title">▶ Choose Your Stake</h2>
                    
                    <button class="play-btn btn-10" onclick="selectStake(10)">
                        Play 10
                    </button>
                    
                    <button class="play-btn btn-20" onclick="selectStake(20)">
                        Play 20
                    </button>
                </div>
            </div>

            <div id="card-selection-view" class="view-hidden">
                <div class="live-board">
                    <div class="live-status">🟢 LIVE PLAYERS: <span id="live-players-count">1,245</span></div>
                    <div class="jackpot-status">🏆 JACKPOT: <span id="jackpot-amount">0</span> ETB</div>
                </div>

                <h3 class="section-title">🎟️ የካርቴላ ምርጫ (Bingo 7)</h3>
                <p class="balance-text">የእርስዎ ቀሪ ሂሳብ: <b id="user-balance-display">0 ETB</b></p>
                
                <div class="cards-grid" id="cards-container"></div>
                
                <p class="note-text">⚠️ ማሳሰቢያ: ካርቴላ ለመውሰድ ሂሳብዎ ላይ በቂ ብር መኖር አለበት።</p>
            </div>
        </main>

        <nav class="bottom-nav">
            <button class="nav-item active" onclick="switchTab('game')">
                <span class="nav-icon">🎮</span>
                <span class="nav-label">Game</span>
            </button>
            <button class="nav-item" onclick="switchTab('history')">
                <span class="nav-icon">🕒</span>
                <span class="nav-label">History</span>
            </button>
            <button class="nav-item" onclick="switchTab('wallet')">
                <span class="nav-icon">👛</span>
                <span class="nav-label">Wallet</span>
            </button>
            <button class="nav-item" onclick="switchTab('profile')">
                <span class="nav-icon">👤</span>
                <span class="nav-label">Profile</span>
            </button>
        </nav>
    </div>

    <script src="mini-app.js"></script>
</body>
</html>
